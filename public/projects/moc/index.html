<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https:;
      connect-src 'self'
        %REACT_APP_ENVIRONMENT_API_OPERATIONS%
        https://api-operations.moneyonchain.com
        https://api-operations-testnet.moneyonchain.com
        https://api-operations-alpha-testnet.moneyonchain.com
        https://moc-incentives.moneyonchain.com
        https://moc-incentives-testnet.moneyonchain.com
        https://moc-incentives-alpha.moneyonchain.com
        https://api.moneyonchain.com
        https://public-node.rsk.co
        https://public-node.testnet.rsk.co
        wss://relay.walletconnect.com
        wss://relay.walletconnect.org
        https://rpc.walletconnect.com
        https://explorer-api.walletconnect.com
        https://verify.walletconnect.com
        https://bridge.dcentwallet.com;
      frame-src https://connect.trezor.io;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      manifest-src 'self';
    " />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Money On Chain - Dollar On Chain - Stable Protocol Interface" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/Moc/icons/favicon-192x192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `pnpm run build`.
    -->
    <title>Money On Chain - Dollar On Chain - Stable Interface</title>

    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,500,600,700" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600,700,900" rel="stylesheet">
    
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin development, run `pnpm start`.
      To create a production bundle, use `pnpm run build`.
    -->
  </body>
</html>
